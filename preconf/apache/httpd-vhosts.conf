################################################################
# Apache VHOST configuration file                               
# Default file for install, it will be overwritten at end of install
################################################################

# Configuration for Bulwark control panel.
<VirtualHost *:80>
    ServerAdmin YOUREMAIL@YOUDOMAIN.COM
    DocumentRoot "/usr/local/bulwark/"
    ServerName panel.YOURDOMAIN.COM
    ServerAlias *.panel.YOURDOMAIN.COM
    <Location /server-status>
        SetHandler server-status
        Require local
    </Location>
    AddType application/x-httpd-php .php
    <Directory "/usr/local/bulwark/">
        Options +FollowSymLinks
        Require all granted
    </Directory>
    # Custom settings are loaded below this line (if any exist)
</VirtualHost>
