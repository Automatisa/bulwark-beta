# Bulwark Apache Include file
# Written by Bobby Allen, 15/05/2011
# Adaptado para FreeBSD + Apache 2.4 + PHP-FPM
 
# Set the Bulwark Alias (used for development, sable will eventually use a VHOST)
#Alias /Bulwark /usr/local/bulwark
 
# Set a default server name for the master configuration to supress Apache daemon warnings
ServerName localhost
 
# Setup the directory settings and PHP security flags for the Bulwark application directory.
<Directory /usr/local/bulwark>
    Options +FollowSymLinks
    DirectoryIndex index.php index.html

    # Pasar la cabecera Authorization a PHP-FPM (necesario para el Bearer token de la
    # API REST bin/api.php; sin esto Apache la descarta y toda la API da 401).
    CGIPassAuth On

    # PHP-FPM via mod_proxy_fcgi (PHP 8.4, FreeBSD)
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php-fpm/www.sock|fcgi://localhost/"
    </FilesMatch>
</Directory>
 
# Disallow web access to directories that don't need it/that we don't want people looking in!
<Directory /usr/local/bulwark/cnf/>
    Require all denied
</Directory>
<Directory /usr/local/bulwark/modules/*/hooks>
    Require all denied
</Directory>
# Bloquear metadatos de control de versiones (el instalador hace git clone en el
# docroot y dejaba .git accesible por HTTP -> divulgación de código/estado de despliegue).
<DirectoryMatch "/usr/local/bulwark/\.git">
    Require all denied
</DirectoryMatch>
RedirectMatch 404 /\.(git|svn|hg)(/|$)

# Set server tokens
ServerTokens Prod

# Now we include the generic VHOST configuration file that holds all Bulwark user hosted vhost data
Include /usr/local/etc/bulwark/apache/httpd-vhosts.conf
