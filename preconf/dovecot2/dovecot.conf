##
## Dovecot config file — FreeBSD / Bulwark
##
listen = *

# Require STARTTLS or SSL before accepting plain-text credentials
disable_plaintext_auth = yes

ssl = no
# For production enable SSL:
#ssl = required
#ssl_cert = </usr/local/etc/ssl/bulwark/mail.crt
#ssl_key = </usr/local/etc/ssl/bulwark/mail.key

log_timestamp = %Y-%m-%d %H:%M:%S
protocols = imap pop3 lmtp sieve
auth_mechanisms = plain login

passdb {
  driver = sql
  args = /usr/local/etc/bulwark/configs/dovecot2/dovecot-mysql.conf
}
userdb {
  driver = prefetch
}
userdb {
  driver = sql
  args = /usr/local/etc/bulwark/configs/dovecot2/dovecot-mysql.conf
}

mail_location = maildir:/var/bulwark/vmail/%d/%n
mailbox_idle_check_interval = 30 secs
maildir_copy_with_hardlinks = yes

service imap-login {
  inet_listener imap {
    port = 143
  }
}
service pop3-login {
  inet_listener pop3 {
    port = 110
  }
}
service lmtp {
  unix_listener lmtp {
    #mode = 0666
  }
}
service imap {
  vsz_limit = 256M
}
service pop3 {
}
service auth {
  unix_listener auth-userdb {
    mode = 0666
    user = vmail
    group = mail
  }

  # Postfix smtp-auth
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
    user = postfix
    group = postfix
  }
}
service auth-worker {
}
service dict {
  unix_listener dict {
    mode = 0666
    user = vmail
    group = mail
  }
}
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
  service_count = 1
  process_min_avail = 0
  vsz_limit = 64M
}
service managesieve {
}

lda_mailbox_autocreate = yes
lda_mailbox_autosubscribe = yes

protocol lda {
  mail_plugins = quota sieve
  postmaster_address = !POSTMASTER_EMAIL!
}
protocol imap {
  mail_plugins = quota imap_quota trash
  imap_client_workarounds = delay-newmail
}

lmtp_save_to_detail_mailbox = yes
protocol lmtp {
  mail_plugins = quota sieve
}
protocol pop3 {
  mail_plugins = quota
  pop3_client_workarounds = outlook-no-nuls oe-ns-eoh
  pop3_uidl_format = %08Xu%08Xv
}
protocol sieve {
  managesieve_max_line_length = 65536
  managesieve_implementation_string = Dovecot Pigeonhole
  managesieve_max_compile_errors = 5
}

dict {
  quotadict = mysql:/usr/local/etc/bulwark/configs/dovecot2/dovecot-dict-quota.conf
}

plugin {
  quota = maildir:User quota
  acl = vfile:/usr/local/etc/dovecot/acls
  trash = /usr/local/etc/bulwark/configs/dovecot2/dovecot-trash.conf
  sieve_global_path = /var/bulwark/sieve/globalfilter.sieve
  sieve = ~/dovecot.sieve
  sieve_dir = ~/sieve
  sieve_global_dir = /var/bulwark/sieve/
  sieve_max_script_size = 1M
}

log_path = /var/bulwark/logs/dovecot/dovecot.log
info_log_path = /var/bulwark/logs/dovecot/dovecot-info.log
debug_log_path = /var/bulwark/logs/dovecot/dovecot-debug.log
mail_debug = no
