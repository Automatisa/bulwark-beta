// Bulwark BIND 9 configuration — FreeBSD
// Loaded via: named_conf="/usr/local/etc/bulwark/bind/named.conf" in rc.conf
//
// Dos roles simultáneos mediante views:
//   view "internal"  → resolver validador con DNSSEC para 127.0.0.1 (el panel)
//   view "external"  → servidor autoritativo puro para el resto del mundo
//
// Zone records are written dynamically by the dns_manager daemon hook to:
//   /usr/local/etc/bulwark/bind/etc/named.conf   (zone declarations)
//   /usr/local/etc/bulwark/bind/zones/<domain>.txt (zone data files)

include "/usr/local/etc/bulwark/bind/rndc.key";

controls {
    inet 127.0.0.1 port 953
        allow { 127.0.0.1; }
        keys { "rndc-key"; };
};

// ACL for zone transfers (trusted secondaries).
acl trusted-servers {
    127.0.0.1;
};

options {
    directory           "/var/bulwark/named";

    listen-on  port 53  { any; };
    listen-on-v6        { any; };

    allow-query         { any; };

    // Default: sin recursión. La view "internal" la activa para 127.0.0.1.
    recursion           no;
    allow-recursion     { none; };

    dump-file              "/var/bulwark/named/data/cache_dump.db";
    statistics-file        "/var/bulwark/named/data/named_stats.txt";
    memstatistics-file     "/var/bulwark/named/data/named_mem_stats.txt";

    // Paths para el estado DNSSEC (managed-keys) de la view internal.
    bindkeys-file          "/usr/local/etc/namedb/bind.keys";
    managed-keys-directory "/var/bulwark/named";

    // Default: sin validación. La view "internal" la activa con "auto".
    dnssec-validation   no;

    auth-nxdomain       no;
    allow-transfer      { none; };
};

logging {
    channel bind_log {
        file "/var/bulwark/logs/bind/bind.log"
            versions 3 size 2m;
        severity notice;
        print-time     yes;
        print-category yes;
        print-severity yes;
    };

    channel default_debug {
        file "/var/bulwark/logs/bind/debug.log";
        severity dynamic;
    };

    category default { bind_log; };
};

// ─────────────────────────────────────────────────────────────────────────────
// DNSSEC SIGNING POLICY — para zonas alojadas en Bulwark
// ─────────────────────────────────────────────────────────────────────────────
// KSK: sin rotación automática (el usuario registra el DS en el registrador
//      y un cambio inesperado rompería la cadena de confianza).
// ZSK: rota cada 90 días automáticamente; BIND hace el rollover solo.
// ECDSAP256SHA256 (algoritmo 13): claves 4× más pequeñas que RSA-2048,
//      soportado por todos los registradores modernos.
dnssec-policy "bulwark-dnssec" {
    keys {
        ksk  lifetime unlimited   algorithm ecdsap256sha256;
        zsk  lifetime P90D        algorithm ecdsap256sha256;
    };
    dnskey-ttl              300;
    signatures-validity      14d;
    signatures-refresh        5d;
    max-zone-ttl         604800;
    zone-propagation-delay    5m;
    parent-ds-ttl             1h;
    parent-propagation-delay  1h;
    publish-safety            1h;
    retire-safety             2h;
};

// ─────────────────────────────────────────────────────────────────────────────
// VIEW INTERNAL — resolver con DNSSEC para uso exclusivo del propio servidor
// ─────────────────────────────────────────────────────────────────────────────
view "internal" {
    match-clients       { 127.0.0.1; };

    recursion           yes;
    allow-recursion     { 127.0.0.1; };
    dnssec-validation   auto;

    // La zona hint es obligatoria para que BIND sepa a qué servidores raíz
    // preguntar cuando hace recursión hacia internet.
    zone "." { type hint; file "/usr/local/etc/namedb/named.root"; };

    // Zonas sin DNSSEC: el panel las resuelve localmente sin salir a internet.
    // Las zonas con inline-signing se resuelven vía recursión (solo vista externa).
    include "/usr/local/etc/bulwark/bind/etc/named.conf";
};

// ─────────────────────────────────────────────────────────────────────────────
// VIEW EXTERNAL — servidor autoritativo puro para clientes externos
// ─────────────────────────────────────────────────────────────────────────────
view "external" {
    match-clients       { any; };

    recursion           no;
    dnssec-validation   no;

    // Zonas propias: responde consultas autoritativas, incluidas las firmadas
    // con DNSSEC (dnssec-policy + inline-signing en zonas habilitadas).
    // Archivo separado del de la vista internal para evitar conflicto de
    // "writeable file already in use" cuando inline-signing está activo.
    include "/usr/local/etc/bulwark/bind/etc/named-external.conf";
};
