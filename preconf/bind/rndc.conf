// The key file is generated during installation by rndc-confgen and must
// live in the same directory as named.conf so the FreeBSD rc.d/named script
// finds both files automatically (derived from named_conf path in rc.conf).
include "/usr/local/etc/bulwark/bind/rndc.key";

options {
    default-key    "rndc-key";
    default-server 127.0.0.1;
    default-port   953;
};
